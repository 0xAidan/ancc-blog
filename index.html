<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>Aidan Nugent Consulting Company</title>
    <meta name="description" content="Projects and experiments by Aidan Nugent." />
    <meta property="og:title" content="Aidan Nugent Consulting Company" />
    <meta property="og:description" content="Projects and experiments by Aidan Nugent." />
    <meta property="og:url" content="https://ancc.blog" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Aidan Nugent Consulting Company" />
    <meta name="twitter:description" content="Projects and experiments by Aidan Nugent." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Instrument+Serif&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0d0d0f;
        --text: #e8e8ea;
        --text-muted: #6b6b76;
        --accent: #6ec4e8;
        --cursor: var(--accent);
        --font-serif: "Instrument Serif", Georgia, serif;
        --font-mono: "IBM Plex Mono", ui-monospace, monospace;
        --motion-fast: 0.15s ease;
        --motion-base: 0.25s ease;
        --motion-slow: 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      }

      html {
        color-scheme: dark;
        background-color: var(--bg);
      }

      body {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: max(2rem, env(safe-area-inset-top))
          max(1.5rem, env(safe-area-inset-right))
          max(2rem, env(safe-area-inset-bottom))
          max(1.5rem, env(safe-area-inset-left));
        background-color: var(--bg);
        color: var(--text);
        font-family: var(--font-mono);
        font-size: 0.875rem;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
        position: relative;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 1;
        opacity: 0.035;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        background-repeat: repeat;
        background-size: 180px 180px;
      }

      .skip-link {
        position: absolute;
        top: -100%;
        left: 1rem;
        z-index: 100;
        padding: 0.5rem 1rem;
        background: var(--accent);
        color: var(--bg);
        text-decoration: none;
        font-size: 0.8125rem;
        border-radius: 4px;
      }

      .skip-link:focus-visible {
        top: 1rem;
        outline: 2px solid var(--text);
        outline-offset: 2px;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      main {
        position: relative;
        z-index: 2;
        width: 100%;
        max-width: 520px;
        display: flex;
        flex-direction: column;
        gap: 2.5rem;
      }

      header {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      h1 {
        font-family: var(--font-serif);
        font-size: clamp(1.75rem, 5vw, 2.75rem);
        font-weight: 400;
        line-height: 1.15;
        letter-spacing: -0.01em;
        text-wrap: balance;
        animation: fade-up var(--motion-slow) both;
      }

      .tagline {
        color: var(--text-muted);
        font-size: 0.8125rem;
        animation: fade-up var(--motion-slow) 0.1s both;
      }

      .cursor {
        display: inline-block;
        color: var(--cursor);
        animation: blink 1.1s step-end infinite;
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }

      @keyframes fade-up {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      nav {
        animation: fade-up var(--motion-slow) 0.2s both;
      }

      .project-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
      }

      .project-list li {
        animation: fade-up var(--motion-slow) both;
      }

      .project-list li:nth-child(1) {
        animation-delay: 0.3s;
      }

      .project-list li:nth-child(2) {
        animation-delay: 0.4s;
      }

      .project-link {
        display: block;
        padding: 0.625rem 0;
        text-decoration: none;
        color: inherit;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        position: relative;
        border-radius: 2px;
      }

      .project-link::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: 0.375rem;
        width: 100%;
        height: 1px;
        background: var(--accent);
        transform: scaleX(0);
        transform-origin: left center;
        transition: transform var(--motion-base);
      }

      .project-link:hover::after,
      .project-link:focus-visible::after {
        transform: scaleX(1);
      }

      .project-link:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 4px;
      }

      .project-row {
        display: flex;
        align-items: baseline;
        gap: 0.75rem;
        min-width: 0;
      }

      .prompt {
        flex-shrink: 0;
        color: var(--text-muted);
        transition: transform var(--motion-fast), color var(--motion-fast);
      }

      .project-link:hover .prompt,
      .project-link:focus-visible .prompt {
        transform: translateX(4px);
        color: var(--accent);
      }

      .domain {
        flex: 1;
        min-width: 0;
        color: var(--text-muted);
        transition: color var(--motion-fast);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .project-link:hover .domain,
      .project-link:focus-visible .domain {
        color: var(--text);
      }

      .name {
        flex-shrink: 0;
        color: var(--text);
        font-weight: 500;
        transition: color var(--motion-fast);
      }

      .project-link:hover .name,
      .project-link:focus-visible .name {
        color: var(--accent);
      }

      .description {
        display: block;
        margin-top: 0.25rem;
        padding-left: 1.375rem;
        font-size: 0.75rem;
        color: var(--text-muted);
        max-height: 0;
        opacity: 0;
        overflow: hidden;
        transition: max-height var(--motion-base), opacity var(--motion-base);
      }

      .project-link:hover .description,
      .project-link:focus-visible .description {
        max-height: 2rem;
        opacity: 1;
      }

      footer {
        animation: fade-up var(--motion-slow) 0.5s both;
      }

      .footer-inner {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.75rem;
        color: var(--text-muted);
      }

      .footer-sep {
        color: var(--text-muted);
        opacity: 0.5;
      }

      .footer-link {
        color: var(--text-muted);
        text-decoration: none;
        touch-action: manipulation;
        transition: color var(--motion-fast);
      }

      .footer-link:hover,
      .footer-link:focus-visible {
        color: var(--accent);
      }

      .footer-link:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
        border-radius: 2px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }

        .cursor {
          animation: none;
        }

        .description {
          max-height: none;
          opacity: 1;
        }

        .project-link:hover .prompt,
        .project-link:focus-visible .prompt {
          transform: none;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#projects">Skip to projects</a>
    <main>
      <header>
        <h1 translate="no">Aidan Nugent Consulting Company</h1>
        <p class="tagline">
          Projects and experiments<span class="cursor" aria-hidden="true">▍</span>
        </p>
      </header>

      <nav id="projects" aria-label="Projects">
        <h2 class="sr-only">Projects</h2>
        <ul class="project-list">
          <li>
            <a
              class="project-link"
              href="https://ditto.jungle.win"
              rel="noopener noreferrer"
            >
              <span class="project-row">
                <span class="prompt" aria-hidden="true">→</span>
                <span class="domain" translate="no">ditto.jungle.win</span>
                <span class="name">Ditto</span>
              </span>
              <span class="description">Autonomous Polymarket copy trading</span>
            </a>
          </li>
          <li>
            <a
              class="project-link"
              href="https://golf.ancc.blog"
              rel="noopener noreferrer"
            >
              <span class="project-row">
                <span class="prompt" aria-hidden="true">→</span>
                <span class="domain" translate="no">golf.ancc.blog</span>
                <span class="name">Golf Model</span>
              </span>
              <span class="description">Golf analytics for sports betting</span>
            </a>
          </li>
        </ul>
      </nav>

      <footer>
        <div class="footer-inner">
          <small>© 2026</small>
          <span class="footer-sep" aria-hidden="true">·</span>
          <a
            class="footer-link"
            href="https://github.com/0xAidan"
            rel="noopener noreferrer"
            >github.com/0xAidan</a
          >
        </div>
      </footer>
    </main>
  </body>
</html>
